services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  broker1:
    image: confluentinc/cp-kafka:7.5.0
    hostname: broker1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  broker2:
    image: confluentinc/cp-kafka:7.5.0
    hostname: broker2
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  producer1:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - broker1
      - broker2
    volumes:
      - /home/maria/Projects/BigData_labs/lab_1/data/split:/app/data

  producer2:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - broker1
      - broker2
    volumes:
      - /home/maria/Projects/BigData_labs/lab_1/data/split:/app/data

  data_processor:
    build:
      context: .
      dockerfile: data_processor/Dockerfile
    depends_on:
      - broker1
      - broker2
    volumes:
      - /home/maria/Projects/BigData_labs/lab_1/data/artifacts:/app/artifacts

  visualization_consumer:
    build:
      context: .
      dockerfile: visualization_consumer/Dockerfile
    depends_on:
      - broker1
      - broker2

  ml_consumer:
    build:
      context: .
      dockerfile: ml_consumer/Dockerfile
    depends_on:
      - broker1
      - broker2
    volumes:
      - /home/maria/Projects/BigData_labs/lab_1/data/rf_model:/app/model

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - broker1
      - broker2
